<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBU Activity Statistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
  --blue: #003B7A; --blue-light: #0066cc; --blue-pale: #1e3a5f;
  --bg: #0f172a; --card: #1e293b; --card2: #243146;
  --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
}
html, body {
  font-family: 'Prompt','Segoe UI',sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}
.hidden { display: none !important; }
.list-placeholder { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }

/* ─── Header ─── */
header {
  background: var(--blue);
  padding: 0 16px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  position: sticky; top: 0; z-index: 200;
}
.header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.header-left h1 { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-left p  { font-size: 10px; color: #93c5fd; display: none; }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.user-info { text-align: right; }
.user-info .name  { font-size: 13px; font-weight: 600; }
.role-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 99px; margin-top: 2px;
}
.role-superadmin { background: #7c3aed; color: #fff; }
.role-admin      { background: var(--blue-light); color: #fff; }
.role-dean       { background: var(--yellow); color: #1a1000; }
.dean-scope {
  font-size: 10px; background: rgba(245,158,11,0.15);
  border: 1px solid var(--yellow); color: var(--yellow);
  padding: 2px 8px; border-radius: 99px; white-space: nowrap;
}
.btn-logout {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; padding: 6px 12px; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.btn-logout:hover { background: rgba(255,255,255,0.2); }

/* ─── Login overlay ─── */
#login-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.login-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 360px;
}
.login-box h2 { font-size: 20px; margin-bottom: 4px; }
.login-box .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.form-group input {
  width: 100%; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 15px; font-family: inherit;
}
.form-group input:focus { outline: none; border-color: var(--blue-light); }
.btn-primary {
  width: 100%; padding: 12px; background: var(--blue); color: #fff;
  border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer;
}
.btn-primary:hover { background: var(--blue-light); }
.error-msg { color: var(--red); font-size: 13px; margin-top: 8px; text-align: center; }

/* ─── Layout (mobile-first: stacked) ─── */
.layout { display: flex; flex-direction: column; min-height: calc(100vh - 56px); }

/* ─── Activity panel ─── */
.activity-panel {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-toggle {
  width: 100%; padding: 12px 16px;
  background: none; border: none; border-bottom: 1px solid transparent;
  color: var(--text); font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  transition: background 0.15s;
}
.panel-toggle:hover { background: rgba(255,255,255,0.04); }
.panel-toggle-left { display: flex; align-items: center; gap: 8px; }
.panel-arrow { transition: transform 0.25s; color: var(--muted); font-size: 12px; }
.panel-arrow.open { transform: rotate(180deg); }
.panel-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.28s ease;
}
.panel-body.open { max-height: 300px; }
.panel-header-desktop { display: none; }
.activity-list {
  padding: 8px; display: flex; flex-direction: column; gap: 4px;
  overflow-y: auto; max-height: 260px;
}
.act-item {
  padding: 10px 12px; border-radius: 10px;
  cursor: pointer; transition: background 0.15s;
  border: 1px solid transparent;
}
.act-item:hover  { background: var(--card2); }
.act-item.active { background: var(--blue-pale); border-color: var(--blue-light); }
.act-title { font-size: 13px; font-weight: 600; line-height: 1.3; }
.act-date  { font-size: 11px; color: var(--muted); margin-top: 3px; }
.act-count {
  display: inline-block; margin-top: 5px;
  background: var(--blue); padding: 2px 10px;
  border-radius: 99px; font-size: 12px; font-weight: 700;
}
.act-item.active .act-count { background: var(--blue-light); }
.panel-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.refresh-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px; padding: 5px 10px;
  font-size: 12px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 6px; transition: all 0.15s;
}
.refresh-btn:hover { border-color: var(--blue-light); color: var(--blue-light); }
#refresh-countdown { font-size: 12px; color: var(--muted); margin-left: auto; }

/* ─── Main ─── */
.main {
  flex: 1; padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}
.empty-main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: var(--muted); padding: 40px 0;
}
.empty-main i { font-size: 48px; }
.empty-main p { font-size: 15px; }

/* Title bar */
.activity-titlebar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.activity-titlebar h2 { font-size: 16px; font-weight: 700; line-height: 1.3; }
.activity-titlebar .meta { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
.titlebar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.live-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ─── Stat cards grid ─── */
.stats-row {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;
}
@media (max-width:600px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
.stat-box {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 16px 18px; text-align: center;
}
.stat-num { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ─── Export button ─── */
.btn-export {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 8px;
  background: rgba(34,197,94,0.12); border: 1px solid var(--green);
  color: var(--green); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
}
.btn-export:hover { background: rgba(34,197,94,0.25); }

/* ─── Panel (chart / accordion) ─── */
.panel {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 20px;
}
.panel-title {
  font-size: 14px; font-weight: 700; color: var(--muted);
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.chart-box { height: 220px; }

/* ─── Faculty accordion (same style as public report) ─── */
.fac-group { margin-bottom: 10px; }
.fac-group:last-child { margin-bottom: 0; }
.fac-group-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: rgba(0,119,255,0.07);
  border: 1px solid rgba(0,119,255,0.15); border-radius: 10px;
  cursor: pointer; transition: background 0.2s;
}
.fac-group-header:hover { background: rgba(0,119,255,0.13); }
.fac-group-name  { flex: 1; font-size: 14px; font-weight: 700; }
.fac-group-count { font-size: 14px; font-weight: 700; color: #60a5fa; }
.fac-group-pct   { font-size: 12px; color: var(--muted); }
.fac-toggle { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
.fac-toggle.open { transform: rotate(90deg); }
.major-list { padding: 6px 0 0 14px; display: none; }
.major-list.open { display: block; }
.major-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 12px; border-left: 2px solid rgba(0,119,255,0.2);
  margin-bottom: 4px;
}
.major-name  { flex: 1; font-size: 13px; color: var(--muted); }
.major-count { font-size: 13px; font-weight: 600; white-space: nowrap; }
.major-bar-wrap {
  flex: 1; max-width: 100px; height: 5px;
  background: rgba(255,255,255,0.08); border-radius: 3px;
  overflow: hidden; position: relative;
}
.major-bar-fill {
  height: 100%; border-radius: 3px; transition: width 0.6s ease;
}

/* ─── Recent list ─── */
.recent-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 16px 18px;
}
.recent-card h3 { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 10px; }
.recent-list { display: flex; flex-direction: column; gap: 6px; }
.recent-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.04);
}
.recent-item .ri-name    { flex: 1; font-size: 13px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.recent-item .ri-faculty { font-size: 11px; color: var(--muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.recent-item .ri-time    { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.method-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-qr     { background: var(--green); }
.dot-manual { background: var(--yellow); }

/* ─── Title bar ─── */
.activity-titlebar {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 14px 18px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.activity-titlebar h2 { font-size: 16px; font-weight: 700; line-height: 1.3; }
.activity-titlebar .meta { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
.titlebar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.live-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 8px var(--green); animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* ─── Desktop layout ─── */
@media (min-width: 768px) {
  .header-left p { display: block; }
  .layout { flex-direction: row; height: calc(100vh - 56px); overflow: hidden; }

  .activity-panel {
    width: 260px; flex-shrink: 0;
    border-bottom: none; border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-toggle    { display: none; }
  .panel-body {
    max-height: none !important; overflow: visible !important;
    flex: 1; display: flex; flex-direction: column;
  }
  .panel-header-desktop {
    display: block; padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--muted);
  }
  .activity-list { flex: 1; max-height: none; overflow-y: auto; }
  .panel-footer   { flex-shrink: 0; }

  .main { overflow-y: auto; height: 100%; padding: 20px; gap: 16px; }
  .activity-titlebar h2 { font-size: 18px; }
  .stat-body .value { font-size: 44px; }
}
</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h2>สถิติกิจกรรม</h2>
    <p class="sub">สำหรับผู้บริหารและคณบดี</p>
    <div class="form-group">
      <label>ชื่อผู้ใช้</label>
      <input id="l-user" type="text" placeholder="username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input id="l-pass" type="password" placeholder="password" autocomplete="current-password">
    </div>
    <button type="button" class="btn-primary" id="btn-login">เข้าสู่ระบบ</button>
    <p class="error-msg" id="l-err"></p>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <div>
      <h1><i class="fa-solid fa-chart-bar"></i> NBU Activity Statistics</h1>
      <p>สถิติการเข้าร่วมกิจกรรม — สำหรับผู้บริหาร</p>
    </div>
  </div>
  <div class="header-right">
    <div class="user-info hidden" id="user-info">
      <div class="name" id="ui-name"></div>
      <span class="role-badge" id="ui-role-badge"></span>
    </div>
    <div class="dean-scope hidden" id="dean-scope"></div>
    <button type="button" class="btn-logout" id="btn-logout">
      <i class="fa-solid fa-right-from-bracket"></i> ออก
    </button>
  </div>
</header>

<!-- Layout -->
<div class="layout hidden" id="layout">

  <!-- Activity panel (sidebar on desktop, collapsible on mobile) -->
  <div class="activity-panel">
    <!-- Mobile toggle -->
    <button type="button" class="panel-toggle" id="panel-toggle" onclick="togglePanel()">
      <span class="panel-toggle-left">
        <i class="fa-solid fa-calendar-check"></i>
        <span id="toggle-label">เลือกกิจกรรม</span>
      </span>
      <i class="fa-solid fa-chevron-down panel-arrow" id="panel-arrow"></i>
    </button>
    <!-- Body (always visible on desktop via CSS) -->
    <div class="panel-body" id="panel-body">
      <div class="panel-header-desktop">
        <i class="fa-solid fa-calendar-check"></i> กิจกรรมที่เปิดอยู่
      </div>
      <div class="activity-list" id="activity-list">
        <div class="list-placeholder">กำลังโหลด...</div>
      </div>
      <div class="panel-footer">
        <button type="button" class="refresh-btn" onclick="refreshAll()">
          <i class="fa-solid fa-rotate-right" id="refresh-icon"></i> รีเฟรช
        </button>
        <span id="refresh-countdown"></span>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main" id="main-content">
    <div class="empty-main" id="empty-state">
      <i class="fa-solid fa-chart-pie"></i>
      <p>เลือกกิจกรรมเพื่อดูสถิติ</p>
    </div>
  </div>
</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────────
const API = '/api/v1';
let token        = localStorage.getItem('admin_token') || '';
let currentUser  = null;
let selectedId   = null;
let statsData    = null;
let refreshTimer = null;
let countdown    = 30;
let panelOpen    = false;
let facChart     = null;

// ─── Constants ─────────────────────────────────────────────────────────────────
const COLORS = ['#0077ff','#00c6ff','#22c55e','#f59e0b','#a855f7',
                '#ef4444','#06b6d4','#84cc16','#f97316','#ec4899'];
const FACULTY_ABBR = {
  'เทคโนโลยีสารสนเทศและนวัตกรรมดิจิทัล': 'ITDI',
  'นิเทศศาสตร์':    'CA',
  'บริหารธุรกิจ':   'BA',
  'พยาบาลศาสตร์':   'NS',
  'รัฐศาสตร์':      'PS',
  'วิทยาลัยนานาชาติ': 'IC',
  'ศิลปศาสตร์':     'LA',
  'ศึกษาศาสตร์':    'ED',
};
const facAbbr = name => FACULTY_ABBR[name] || name;

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── JWT decode ────────────────────────────────────────────────────────────────
function decodeJWT(t) {
  const b64    = t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  const padded = b64.padEnd(b64.length + (4 - b64.length % 4) % 4, '=');
  const bytes  = Uint8Array.from(atob(padded), c => c.charCodeAt(0));
  return JSON.parse(new TextDecoder().decode(bytes));
}

// ─── API helper ────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...opts.headers },
    ...opts,
  });
  return res.json();
}

// ─── Login ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  const errEl    = document.getElementById('l-err');
  const btn      = document.getElementById('btn-login');
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  try {
    const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    if (!data.success) { errEl.textContent = data.message; return; }
    if (!['superadmin', 'admin', 'dean'].includes(data.user.role)) {
      errEl.textContent = 'ไม่มีสิทธิ์เข้าถึงหน้านี้'; return;
    }
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('admin_token', token);
    showDashboard();
  } catch { errEl.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์'; }
  finally { btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; }
}

function showDashboard() {
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('layout').classList.remove('hidden');

  document.getElementById('user-info').classList.remove('hidden');
  document.getElementById('ui-name').textContent = currentUser.full_name;
  const badge = document.getElementById('ui-role-badge');
  badge.textContent = currentUser.role;
  badge.className = `role-badge role-${currentUser.role}`;

  if (currentUser.role === 'dean' && currentUser.faculty_scope) {
    const scopeEl = document.getElementById('dean-scope');
    scopeEl.textContent = `คณะ: ${currentUser.faculty_scope}`;
    scopeEl.classList.remove('hidden');
  }
  loadActivities();
  startRefreshTimer();
}

// ─── Mobile panel toggle ───────────────────────────────────────────────────────
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('panel-body').classList.toggle('open', panelOpen);
  document.getElementById('panel-arrow').classList.toggle('open', panelOpen);
}

function collapsePanel() {
  panelOpen = false;
  document.getElementById('panel-body').classList.remove('open');
  document.getElementById('panel-arrow').classList.remove('open');
}

// ─── Auto-refresh ──────────────────────────────────────────────────────────────
function startRefreshTimer() {
  clearInterval(refreshTimer);
  countdown = 30;
  document.getElementById('refresh-countdown').textContent = `${countdown}s`;
  refreshTimer = setInterval(() => {
    countdown--;
    document.getElementById('refresh-countdown').textContent = `${countdown}s`;
    if (countdown <= 0) refreshAll();
  }, 1000);
}

async function refreshAll() {
  await loadActivities();
  if (selectedId) await loadStats(selectedId);
  countdown = 30;
}

// ─── Activity list ─────────────────────────────────────────────────────────────
async function loadActivities() {
  const icon = document.getElementById('refresh-icon');
  icon.className = 'fa-solid fa-rotate-right fa-spin';

  const data = await api('/stats/activities');
  icon.className = 'fa-solid fa-rotate-right';
  if (!data.success) return;

  const list = document.getElementById('activity-list');
  if (!data.data.length) {
    list.innerHTML = '<div class="list-placeholder">ไม่มีกิจกรรมที่เปิดอยู่</div>';
    document.getElementById('toggle-label').textContent = 'ไม่มีกิจกรรม';
    return;
  }

  document.getElementById('toggle-label').textContent = `กิจกรรม (${data.data.length})`;
  list.innerHTML = data.data.map(a => `
    <div class="act-item ${a.id == selectedId ? 'active' : ''}"
         onclick="selectActivity('${a.id}')">
      <div class="act-title">${a.title}</div>
      <div class="act-date">
        <i class="fa-solid fa-calendar-days" style="font-size:10px"></i>
        ${new Date(a.start_datetime).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' })}
      </div>
      <div class="act-count">${a.attendee_count} คน</div>
    </div>
  `).join('');
}

async function selectActivity(id) {
  selectedId = id;
  collapsePanel();
  document.querySelectorAll('.act-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[onclick="selectActivity('${id}')"]`)?.classList.add('active');
  await loadStats(id);
}

// ─── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats(id) {
  const data = await api(`/stats/${id}`);
  if (!data.success) return;

  statsData = data.data;
  renderDashboard();
}

    ...d.by_faculty_major.map(r => r.label || ''),

          <i class="fa-solid fa-calendar"></i> ${dateStr}

        <button class="btn-export" onclick="exportCSV()">

    </div>

    ${hasTarget ? `
    <div class="stat-box" style="background:linear-gradient(135deg,rgba(0,119,255,0.08),rgba(0,198,255,0.05));border-color:rgba(0,119,255,0.25);text-align:left;padding:18px 20px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div style="flex:1;min-width:180px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">เป้าหมาย / เข้าร่วม</div>

            ${Number(d.total).toLocaleString()}

          </div>
          <div style="margin-top:10px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${Math.min(rate,100)}%;background:linear-gradient(90deg,#0077ff,#00c6ff);border-radius:3px;transition:width 0.8s ease"></div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:36px;font-weight:800;color:#00c6ff;line-height:1">${rate}%</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">อัตราการเข้าร่วม</div>
          <div style="font-size:12px;color:#f87171;margin-top:4px">ขาด ${Number(absent).toLocaleString()} คน</div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num">${Number(d.total).toLocaleString()}</div>

      </div>

        <div class="stat-num">${Number(d.target_count).toLocaleString()}</div>
        <div class="stat-lbl">กลุ่มเป้าหมาย (คน)</div>

// ─── Faculty breakdown table (legacy, replaced by accordion) ───────────────────
function buildFacultyTable(d) {
  const hasTarget = d.tgt_by_faculty && d.tgt_by_faculty.length > 0;

  // maps
  const attFac = {}, tgtFac = {}, attMaj = {}, tgtMaj = {};
  d.by_faculty.forEach(r => { attFac[r.label || ''] = parseInt(r.count); });
  (d.tgt_by_faculty || []).forEach(r => { tgtFac[r.label || ''] = parseInt(r.total); });
  d.by_faculty_major.forEach(r => { attMaj[`${r.faculty}||${r.label}`] = parseInt(r.count); });
  (d.tgt_by_major || []).forEach(r => { tgtMaj[`${r.faculty}||${r.label}`] = parseInt(r.total); });

  // ทุก faculty จาก attended + target
  const facSet = new Set([
    ...d.by_faculty.map(r => r.label || ''),
    ...(d.tgt_by_faculty || []).map(r => r.label || ''),
  ]);
  if (!facSet.size) return '';

  // major per faculty จาก attended + target
  const majPerFac = {};
  [...d.by_faculty_major.map(r => `${r.faculty}||${r.label}`),
   ...(d.tgt_by_major || []).map(r => `${r.faculty}||${r.label}`)
  ].forEach(key => {
    const fac = key.split('||')[0];
    if (!majPerFac[fac]) majPerFac[fac] = new Set();
    majPerFac[fac].add(key);
  });

  const pct = (a, t) => t > 0 ? Math.round(a / t * 100) : null;
  const progressBar = (p, att) => `
    <div style="margin-top:4px;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden">
      <div style="height:100%;width:${Math.min(p ?? 0, 100)}%;background:${att > 0 ? '#3b82f6' : '#d1d5db'};border-radius:3px;transition:width 0.6s"></div>
    </div>`;

  const facRows = [...facSet].sort((a,b) => a.localeCompare(b,'th')).map(fac => {
    const att  = attFac[fac] || 0;
    const tot  = tgtFac[fac] || 0;
    const absent = hasTarget ? Math.max(tot - att, 0) : null;
    const p    = pct(att, tot);

    const majRows = majPerFac[fac] ? [...majPerFac[fac]].sort((a,b)=>a.localeCompare(b,'th')).map(key => {
      const maj   = key.split('||')[1];
      const mAtt  = attMaj[key] || 0;
      const mTot  = tgtMaj[key] || 0;
      const mAbs  = hasTarget ? Math.max(mTot - mAtt, 0) : null;
      const mPct  = pct(mAtt, mTot);
      return `<tr style="background:#f8fafc;border-top:1px solid #f1f5f9">
        <td style="padding:5px 10px 5px 28px;color:#374151;font-size:12px">· ${maj || '(ไม่ระบุ)'}</td>
        ${hasTarget ? `
        <td style="padding:5px 10px;text-align:right;font-size:12px;color:#6b7280">${mTot.toLocaleString()}</td>
        <td style="padding:5px 10px;text-align:right;font-size:12px">
          <span style="font-weight:600;color:${mAtt>0?'#1d4ed8':'#9ca3af'}">${mAtt.toLocaleString()}</span>
        </td>
        <td style="padding:5px 10px;text-align:right;font-size:12px;color:${mAbs>0?'#ef4444':'#9ca3af'}">${mAbs?.toLocaleString() ?? '-'}</td>
        <td style="padding:5px 14px 5px 4px;min-width:80px">
          ${mPct !== null ? `<span style="font-size:11px;color:#3b82f6;font-weight:600">${mPct}%</span>` : '<span style="color:#d1d5db;font-size:11px">-</span>'}
          ${progressBar(mPct, mAtt)}
        </td>` : `
        <td style="padding:5px 14px;text-align:right;font-size:12px;font-weight:600">${mAtt.toLocaleString()} คน</td>`}
      </tr>`;
    }).join('') : '';

    return `
      <tr style="border-top:2px solid #e5e7eb;background:#fff">
        <td style="padding:8px 10px;font-weight:700;font-size:13px;color:#111827">${fac || '(ไม่ระบุ)'}</td>
        ${hasTarget ? `
        <td style="padding:8px 10px;text-align:right;font-size:13px;color:#374151;font-weight:600">${tot.toLocaleString()}</td>
        <td style="padding:8px 10px;text-align:right;font-size:13px">
          <span style="font-weight:700;color:${att>0?'#1d4ed8':'#9ca3af'}">${att.toLocaleString()}</span>
        </td>
        <td style="padding:8px 10px;text-align:right;font-size:13px;color:${absent>0?'#dc2626':'#9ca3af'};font-weight:600">${absent?.toLocaleString() ?? '-'}</td>
        <td style="padding:8px 14px 8px 4px;min-width:80px">
          ${p !== null ? `<span style="font-size:12px;color:#1d4ed8;font-weight:700">${p}%</span>` : '<span style="color:#d1d5db">-</span>'}
          ${progressBar(p, att)}
        </td>` : `
        <td style="padding:8px 14px;text-align:right;font-size:13px;font-weight:700">${att.toLocaleString()} คน</td>`}
      </tr>
      ${majRows}`;
  }).join('');

  const thead = hasTarget ? `
    <tr style="background:#f3f4f6">
      <th style="padding:7px 10px;text-align:left;color:#6b7280;font-size:12px;font-weight:600">คณะ / สาขา</th>
      <th style="padding:7px 10px;text-align:right;color:#6b7280;font-size:12px;font-weight:600">เป้าหมาย</th>
      <th style="padding:7px 10px;text-align:right;color:#6b7280;font-size:12px;font-weight:600">เข้าร่วม</th>
      <th style="padding:7px 10px;text-align:right;color:#6b7280;font-size:12px;font-weight:600">ขาด</th>
      <th style="padding:7px 14px 7px 4px;color:#6b7280;font-size:12px;font-weight:600;min-width:80px">%</th>
    </tr>` : `
    <tr style="background:#f3f4f6">
      <th style="padding:7px 10px;text-align:left;color:#6b7280;font-size:12px;font-weight:600">คณะ / สาขา</th>
      <th style="padding:7px 14px;text-align:right;color:#6b7280;font-size:12px;font-weight:600">จำนวน</th>
    </tr>`;

  return `
  <div class="chart-card" style="padding:0;overflow:hidden">
    <div class="chart-header" style="padding:12px 16px">
      <span class="chart-title-text">
        <i class="fa-solid fa-table" style="margin-right:6px"></i>
        แยกตามคณะ / สาขา
        ${hasTarget ? '<span style="font-size:11px;font-weight:400;color:#6b7280;margin-left:6px">เป้าหมาย · เข้าร่วม · ขาด · %</span>' : ''}
      </span>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:400px">
        <thead>${thead}</thead>
        <tbody>${facRows}</tbody>
      </table>
    </div>
  </div>`;
}

// ─── Vertical bar chart (same style as public report) ──────────────────────────
function renderFacultyChart(byFac, byTgt = []) {
  if (facChart) { facChart.destroy(); facChart = null; }

  const tgtMap = Object.fromEntries(byTgt.map(f => [f.label||'', parseInt(f.total)]));
  const attMap = Object.fromEntries(byFac.map(f => [f.label||'', parseInt(f.count)]));
  const allFac = [...new Set([...byFac.map(f=>f.label||''), ...byTgt.map(f=>f.label||'')])].sort((a,b)=>a.localeCompare(b,'th'));
  const hasTarget = byTgt.length > 0;

  const datasets = hasTarget ? [
    {
      label: 'เป้าหมาย',
      data: allFac.map(f => tgtMap[f] || 0),
      backgroundColor: 'rgba(148,163,184,0.25)',
      borderColor: 'rgba(148,163,184,0.5)',
      borderWidth:1, borderRadius:6,
    },
    {
      label: 'เข้าร่วม',
      data: allFac.map(f => attMap[f] || 0),
      backgroundColor: allFac.map((_,i) => COLORS[i%COLORS.length]+'bb'),
      borderColor:     allFac.map((_,i) => COLORS[i%COLORS.length]),
      borderWidth:1, borderRadius:6,
    },
  ] : [{
    label: 'เข้าร่วม',
    data: allFac.map(f => attMap[f] || 0),
    backgroundColor: allFac.map((_,i) => COLORS[i%COLORS.length]+'bb'),
    borderColor:     allFac.map((_,i) => COLORS[i%COLORS.length]),
    borderWidth:1, borderRadius:6,
  }];

  const ctx = document.getElementById('chart-main').getContext('2d');
  facChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: allFac.map(f => facAbbr(f) || '—'), datasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ display: hasTarget, labels:{ color:'#94a3b8', font:{family:'Prompt',size:11} } },
        tooltip:{ callbacks:{
          title: items => allFac[items[0].dataIndex] || '—',
          label: c => {
            if (!hasTarget) return ` ${c.raw.toLocaleString()} คน`;
            const fac = allFac[c.dataIndex];
            if (c.dataset.label === 'เป้าหมาย') return ` เป้าหมาย ${(tgtMap[fac]||0).toLocaleString()} คน`;
            const t = tgtMap[fac] || 0;
            const p = t > 0 ? Math.round((attMap[fac]||0) / t * 100) : null;
            return ` เข้าร่วม ${(attMap[fac]||0).toLocaleString()} คน${p !== null ? ` (${p}%)` : ''}`;
          },
        }},
      },
      scales:{
        x:{ ticks:{color:'#94a3b8',font:{family:'Prompt',size:11}},
            grid:{color:'rgba(255,255,255,0.04)'} },
        y:{ ticks:{color:'#94a3b8',font:{family:'Prompt'}},
            grid:{color:'rgba(255,255,255,0.06)'},beginAtZero:true },
      },
    },
  });
}

// ─── Faculty + Major accordion ─────────────────────────────────────────────────
function renderFacultyAccordion(byFaculty, byMajor, byTgtFac = [], byTgtMaj = []) {
  const container = document.getElementById('accordion-list');
  const hasTarget = byTgtFac.length > 0;

  const tgtFacMap = Object.fromEntries(byTgtFac.map(f => [f.label||'', parseInt(f.total)]));
  const tgtMajMap = Object.fromEntries(byTgtMaj.map(m => [`${m.faculty}||${m.label}`, parseInt(m.total)]));
  const attMajMap = {};
  byMajor.forEach(m => { attMajMap[`${m.faculty}||${m.label}`] = parseInt(m.count); });

  const allFacMap = {};
  byFaculty.forEach(f => { allFacMap[f.label||''] = parseInt(f.count); });
  byTgtFac.forEach(f => { if (!(f.label in allFacMap)) allFacMap[f.label||''] = 0; });
  const allFaculties = Object.keys(allFacMap).sort((a,b) => a.localeCompare(b,'th'));

  const majorMap = {};
  byMajor.forEach(m => {
    if (!majorMap[m.faculty]) majorMap[m.faculty] = new Set();
    majorMap[m.faculty].add(m.label||'');
  });
  byTgtMaj.forEach(m => {
    if (!majorMap[m.faculty]) majorMap[m.faculty] = new Set();
    majorMap[m.faculty].add(m.label||'');
  });

  container.innerHTML = allFaculties.map((facName, fi) => {
    const att   = allFacMap[facName] || 0;
    const tot   = tgtFacMap[facName] || 0;
    const color = COLORS[fi % COLORS.length];
    const pct   = hasTarget
      ? (tot > 0 ? Math.round(att / tot * 100) : 0)
      : Math.round(att / Math.max(...Object.values(allFacMap), 1) * 100);

    const majors = majorMap[facName] ? [...majorMap[facName]].sort((a,b)=>a.localeCompare(b,'th')) : [];
    const maxMajAtt = Math.max(...majors.map(m => attMajMap[`${facName}||${m}`]||0), 1);

    const majorRows = majors.map(maj => {
      const mAtt = attMajMap[`${facName}||${maj}`] || 0;
      const mTot = tgtMajMap[`${facName}||${maj}`] || 0;
      const mPct = hasTarget
        ? (mTot > 0 ? Math.round(mAtt / mTot * 100) : 0)
        : Math.round(mAtt / maxMajAtt * 100);
      return `
        <div class="major-row">
          <div class="major-name">${esc(maj || '—')}</div>
          <div class="major-count">
            ${hasTarget
              ? `<span style="color:#fff;font-weight:600">${mAtt.toLocaleString()}</span><span style="color:var(--muted);font-size:11px"> / ${mTot.toLocaleString()}</span>`
              : `${mAtt.toLocaleString()} คน`}
          </div>
          <div class="major-bar-wrap">
            ${hasTarget && mTot > 0 ? `<div class="major-bar-fill" style="width:${Math.min(mPct,100)}%;background:rgba(148,163,184,0.3)"></div>` : ''}
            <div class="major-bar-fill" style="width:${Math.min(mPct,100)}%;background:${color}88"></div>
          </div>
          ${hasTarget ? `<div style="font-size:11px;color:${mPct>=100?'var(--green)':color};font-weight:600;min-width:36px;text-align:right">${mPct}%</div>` : ''}
        </div>`;
    }).join('');

    const headerCount = hasTarget
      ? `<div class="fac-group-count">${att.toLocaleString()} <span style="color:var(--muted);font-size:11px">/ ${tot.toLocaleString()}</span></div>
         <div class="fac-group-pct" style="color:${pct>=100?'var(--green)':color}">${pct}%</div>`
      : `<div class="fac-group-count">${att.toLocaleString()} คน</div>
         <div class="fac-group-pct">(${pct}%)</div>`;

    return `
      <div class="fac-group">
        <div class="fac-group-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.fac-toggle').classList.toggle('open')">
          <div style="width:10px;height:10px;border-radius:3px;flex-shrink:0;background:${color}"></div>
          <div class="fac-group-name">${esc(facName || '—')}</div>
          ${headerCount}
          <i class="fa-solid fa-chevron-right fac-toggle"></i>
        </div>
        <div class="major-list">
          ${majorRows || '<div style="padding:8px 12px;font-size:12px;color:var(--muted)">ไม่มีข้อมูลสาขา</div>'}
        </div>
      </div>`;
  }).join('');
}

// ─── Export CSV — รายชื่อทั้งหมดพร้อมสถานะเข้าร่วม ──────────────────────────────
function exportCSV() {
  if (!statsData) return;
  const d = statsData;
  const csvEsc = v => { const s = String(v ?? ''); return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s; };
  const dateStr = new Date(d.activity.start_datetime).toLocaleString('th-TH');

  const header = [
    ['กิจกรรม', csvEsc(d.activity.title)].join(','),
    ['วันที่', csvEsc(dateStr)].join(','),
    ['สถานที่', csvEsc(d.activity.location || '-')].join(','),
    ['เข้าร่วม', d.total + ' คน'].join(','),
    ...(d.target_count > 0 ? [['เป้าหมาย', d.target_count + ' คน'].join(',')] : []),
    '',
    ['#', 'รหัสนักศึกษา', 'ชื่อ-นามสกุล', 'คณะ', 'สาขา', 'รุ่น', 'สถานะการเข้าร่วม'].join(','),
  ];

  const attended = d.attended || [];
  const absent   = d.absent   || [];
  const hasTargets = absent.length > 0 || d.target_count > 0;

  let rows = [];
  if (hasTargets) {
    // มีกลุ่มเป้าหมาย → รวมทั้งสองกลุ่มเรียงตามคณะ/สาขา/รหัส
    const allRows = [
      ...attended.map(s => ({ ...s, status: 'เข้าร่วม' })),
      ...absent.map(s   => ({ ...s, status: 'ขาด' })),
    ].sort((a, b) => (a.faculty||'').localeCompare(b.faculty||'','th') || (a.major||'').localeCompare(b.major||'','th') || a.student_id.localeCompare(b.student_id));
    rows = allRows.map((s, i) =>
      [i+1, s.student_id, csvEsc(s.full_name), csvEsc(s.faculty||''), csvEsc(s.major||''), s.cohort||'', s.status].join(',')
    );
  } else {
    // ไม่มีกลุ่มเป้าหมาย → แสดงเฉพาะคนที่มาทั้งหมด
    rows = attended.map((s, i) =>
      [i+1, s.student_id, csvEsc(s.full_name), csvEsc(s.faculty||''), csvEsc(s.major||''), s.cohort||'', 'เข้าร่วม'].join(',')
    );
  }

  const blob = new Blob(['\uFEFF' + [...header, ...rows].join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `รายงาน_${d.activity.title.replace(/[^\u0E00-\u0E7Fa-zA-Z0-9]/g,'_').slice(0,40)}_${Date.now()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── Logout ────────────────────────────────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', () => {
  clearInterval(refreshTimer);
  localStorage.removeItem('admin_token');
  token = ''; currentUser = null; selectedId = null; statsData = null;
  document.getElementById('layout').classList.add('hidden');
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
});

// ─── Login listeners ───────────────────────────────────────────────────────────
document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ─── Auto-login ────────────────────────────────────────────────────────────────
(async () => {
  if (!token) return;
  try {
    const payload = decodeJWT(token);
    if (!['superadmin', 'admin', 'dean'].includes(payload.role)) {
      localStorage.removeItem('admin_token'); return;
    }
    const data = await api('/stats/activities');
    if (data.success) {
      currentUser = {
        id: payload.id, username: payload.username,
        full_name: payload.full_name, role: payload.role,
        faculty_scope: payload.faculty_scope || null,
      };
      showDashboard();
    } else {
      localStorage.removeItem('admin_token');
    }
  } catch { localStorage.removeItem('admin_token'); }
})();
</script>
