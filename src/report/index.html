<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBU Activity — รายงานกิจกรรม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #0077ff;
  --cyan:   #00c6ff;
  --bg:     #060d1a;
  --surf:   rgba(255,255,255,0.04);
  --bdr:    rgba(255,255,255,0.08);
  --text:   #f1f5f9;
  --muted:  #94a3b8;
  --green:  #22c55e;
}

html, body {
  min-height: 100%;
  font-family: 'Prompt', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

.bg-wrap { position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 20% 30%,#001a40 0%,transparent 60%),
             radial-gradient(ellipse at 80% 70%,#001a3a 0%,transparent 60%),#060d1a; }
.orb { position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:float linear infinite; }
.orb1 { width:500px;height:500px;background:#0055b3;top:-100px;left:-100px;animation-duration:22s; }
.orb2 { width:350px;height:350px;background:#00c6ff;bottom:-80px;right:-80px;animation-duration:28s;animation-direction:reverse; }
@keyframes float {
  0%   { transform:translate(0,0) scale(1); }
  33%  { transform:translate(30px,-20px) scale(1.05); }
  66%  { transform:translate(-20px,30px) scale(0.95); }
  100% { transform:translate(0,0) scale(1); }
}
.grid-overlay { position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,119,255,0.04) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,119,255,0.04) 1px,transparent 1px);
  background-size:60px 60px; }

.wrap { position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 16px 80px; }

/* ─── Page header ─── */
.page-header {
  display:flex;align-items:center;gap:14px;margin-bottom:28px;
  animation:fadeUp 0.5s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.logo-ring {
  width:50px;height:50px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#0055b3,var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#fff;
  box-shadow:0 0 0 8px rgba(0,119,255,0.1),0 0 40px rgba(0,198,255,0.18);
}
.header-text h1 {
  font-size:clamp(17px,4vw,24px);font-weight:800;
  background:linear-gradient(135deg,#fff 40%,var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-text p { color:var(--muted);font-size:12px;margin-top:2px; }

/* ─── Activity list ─── */
.section-label { font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px; }

.act-list { display:flex;flex-direction:column;gap:10px;animation:fadeUp 0.5s 0.1s ease both; }

.act-card {
  cursor:pointer;
  display:flex;align-items:center;gap:14px;padding:16px 18px;
}
.act-card:active { opacity:0.85; }
.act-icon {
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:rgba(0,119,255,0.12);border:1px solid rgba(0,119,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);
}
.act-info { flex:1;min-width:0; }
.act-title { font-size:15px;font-weight:700;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.act-sub { font-size:12px;color:var(--muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:8px; }
.act-sub span { display:inline-flex;align-items:center;gap:4px; }
.act-count { flex-shrink:0;text-align:right; }
.act-count .num { font-size:22px;font-weight:800;color:#fff;line-height:1; }
.act-count .lbl { font-size:11px;color:var(--muted); }
.act-arrow { width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(0,119,255,0.1);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--accent); }

.act-card-wrap { background:var(--surf);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s; }
.act-card-wrap:hover { border-color:rgba(0,119,255,0.4);box-shadow:0 8px 28px rgba(0,0,0,0.4); }
.act-card-wrap .act-card { border-radius:0;border:none;background:none;
  transition:background 0.2s; }
.act-card-wrap .act-card:hover { background:rgba(255,255,255,0.04); }
.act-card-footer {
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;border-top:1px solid var(--bdr);
  background:rgba(0,0,0,0.15);
}
.act-link-url { flex:1;font-family:monospace;font-size:11px;color:rgba(255,255,255,0.25);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.act-copy-btn {
  flex-shrink:0;display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,119,255,0.12);border:1px solid rgba(0,119,255,0.25);
  color:var(--accent);padding:5px 12px;border-radius:6px;
  font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:background 0.2s,border-color 0.2s;
}
.act-copy-btn:hover { background:rgba(0,119,255,0.22);border-color:rgba(0,119,255,0.45); }

/* ─── Toast ─── */
.toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1e293b;border:1px solid rgba(34,197,94,0.4);color:var(--green);
  padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;
  z-index:9999;transition:transform 0.3s ease;pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* ─── Detail view ─── */
#detail-view { animation:fadeUp 0.4s ease both; }

.detail-title {
  font-size:clamp(18px,4vw,26px);font-weight:800;margin-bottom:8px;
  background:linear-gradient(135deg,#fff 40%,var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.detail-meta { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px; }
.chip {
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid var(--bdr);
  border-radius:99px;padding:4px 12px;font-size:12px;color:var(--muted);
}
.chip i { color:var(--accent);font-size:11px; }

/* ─── Stat boxes ─── */
.stats-row { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px; }
.stat-box {
  background:var(--surf);border:1px solid var(--bdr);border-radius:14px;
  padding:16px 18px;text-align:center;
}
.stat-num { font-size:36px;font-weight:800;color:#fff;line-height:1; }
.stat-lbl { font-size:11px;color:var(--muted);margin-top:4px; }
@media (max-width:520px) { .stats-row { grid-template-columns:repeat(2,1fr); } }

/* ─── Panels ─── */
.panel {
  background:var(--surf);border:1px solid var(--bdr);border-radius:14px;
  padding:20px;margin-bottom:16px;
}
.panel-title { font-size:13px;font-weight:600;margin-bottom:16px; }
.panel-title i { color:var(--accent);margin-right:6px; }
.chart-box { position:relative;height:240px; }

/* ─── Faculty table ─── */
.fac-table { width:100%;border-collapse:collapse; }
.fac-table th,.fac-table td { padding:9px 12px;text-align:left;border-bottom:1px solid var(--bdr); }
.fac-table th { font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px; }
.fac-table td { font-size:13px; }
.fac-table tr:last-child td { border-bottom:none; }
.bar-wrap { position:relative;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;min-width:60px; }
.bar-fill { position:absolute;left:0;top:0;height:100%;
  background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:3px;
  transition:width 0.8s ease; }

/* ─── Major accordion (nested under each faculty) ─── */
.fac-group { margin-bottom:12px; }
.fac-group:last-child { margin-bottom:0; }
.fac-group-header {
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:rgba(0,119,255,0.07);border:1px solid rgba(0,119,255,0.15);
  border-radius:10px;cursor:pointer;user-select:none;
  transition:background 0.2s;
}
.fac-group-header:hover { background:rgba(0,119,255,0.12); }
.fac-group-name { flex:1;font-size:14px;font-weight:700; }
.fac-group-count { font-size:14px;font-weight:700;color:var(--accent); }
.fac-group-pct { font-size:12px;color:var(--muted); }
.fac-toggle { font-size:11px;color:var(--muted);transition:transform 0.2s; }
.fac-toggle.open { transform:rotate(90deg); }

.major-list { padding:6px 0 0 14px;display:none; }
.major-list.open { display:block; }
.major-row {
  display:flex;align-items:center;gap:10px;
  padding:7px 12px;border-left:2px solid rgba(0,119,255,0.2);
  margin-bottom:4px;
}
.major-name { flex:1;font-size:13px;color:var(--muted); }
.major-count { font-size:13px;font-weight:600;color:var(--text); }
.major-bar-wrap { width:80px;position:relative;height:4px;
  background:rgba(255,255,255,0.07);border-radius:2px; }
.major-bar-fill { position:absolute;left:0;top:0;height:100%;
  background:rgba(0,119,255,0.5);border-radius:2px; }

/* ─── Loading / Empty / Error ─── */
.loading { text-align:center;padding:60px 20px;color:var(--muted); }
.loading i { font-size:32px;margin-bottom:12px;opacity:0.4;animation:spin 1s linear infinite;display:block; }
@keyframes spin { to{transform:rotate(360deg)} }
.empty { text-align:center;color:var(--muted);padding:60px 20px; }
.empty i { font-size:48px;margin-bottom:16px;opacity:0.3;display:block; }
.error-msg {
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
  border-radius:10px;padding:14px 18px;color:#fca5a5;font-size:13px;margin-bottom:16px;
}

/* ─── Refresh badge ─── */
.refresh-note { font-size:11px;color:rgba(255,255,255,0.2);text-align:right;margin-bottom:10px; }

/* ─── Footer ─── */
footer { position:relative;z-index:1;margin-top:48px;text-align:center;
  color:rgba(255,255,255,0.2);font-size:12px; }
footer strong { color:rgba(255,255,255,0.35); }

@media (max-width:520px) {
  .wrap { padding:20px 12px 60px; }
  .stat-num { font-size:28px; }
  .chart-box { height:190px; }
  .act-card { padding:12px 14px; }
  .major-bar-wrap { display:none; }
}
</style>
</head>
<body>
<div class="bg-wrap"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="grid-overlay"></div>

<div class="wrap">

  <!-- Page header (always visible) -->
  <div class="page-header">
    <div class="logo-ring"><i class="fa-solid fa-chart-bar"></i></div>
    <div class="header-text">
      <h1 id="page-title">รายงานกิจกรรม</h1>
      <p>มหาวิทยาลัยนอร์ทกรุงเทพ — สถิติการเข้าร่วม (ข้อมูลสาธารณะ)</p>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-view">
    <div class="loading"><i class="fa-solid fa-spinner"></i>กำลังโหลดข้อมูล…</div>
  </div>

  <!-- List view -->
  <div id="list-view" style="display:none">
    <div class="section-label">กิจกรรมที่เปิดใช้งาน</div>
    <div class="act-list" id="act-list"></div>
  </div>

  <!-- Detail view -->
  <div id="detail-view" style="display:none">
    <div id="d-error" style="display:none"></div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-meta" id="d-meta"></div>
    <div class="stats-row" id="d-stats"></div>

    <div class="panel" id="d-chart-panel" style="display:none">
      <div class="panel-title"><i class="fa-solid fa-chart-bar"></i>ผู้เข้าร่วมแยกตามคณะ</div>
      <div class="chart-box"><canvas id="fac-chart"></canvas></div>
    </div>

    <div class="panel" id="d-major-panel" style="display:none">
      <div class="panel-title"><i class="fa-solid fa-layer-group"></i>แยกตามคณะและสาขา</div>
      <div id="d-major-list"></div>
    </div>

    <div class="refresh-note" id="refresh-note"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<footer>
  <strong>NBU Activity Check-in System</strong> &nbsp;·&nbsp; มหาวิทยาลัยนอร์ทกรุงเทพ
</footer>

<script>
const API = '/api/v1/public';
let facChart = null;
let refreshTimer = null;

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('th-TH', {
      year:'numeric', month:'short', day:'numeric',
      hour:'2-digit', minute:'2-digit',
    });
  } catch { return iso; }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function showView(name) {
  ['list-view','detail-view','loading-view'].forEach(id => {
    document.getElementById(id).style.display = id === name ? 'block' : 'none';
  });
}

// ─── URL routing ──────────────────────────────────────────────────────────────
function getIdFromURL() {
  return new URLSearchParams(location.search).get('id');
}

// ─── Activity list ────────────────────────────────────────────────────────────
async function loadList() {
  clearInterval(refreshTimer);
  document.getElementById('page-title').textContent = 'รายงานกิจกรรม';
  showView('loading-view');
  try {
    const r = await fetch(`${API}/activities`);
    const { success, data } = await r.json();
    const el = document.getElementById('act-list');

    if (!success || !data?.length) {
      el.innerHTML = `<div class="empty"><i class="fa-solid fa-calendar-xmark"></i>ไม่มีกิจกรรมที่เปิดใช้งาน</div>`;
      showView('list-view');
      return;
    }

    el.innerHTML = data.map(a => `
      <div class="act-card-wrap">
        <div class="act-card" data-id="${a.id}" data-action="open">
          <div class="act-icon"><i class="fa-solid fa-calendar-check"></i></div>
          <div class="act-info">
            <div class="act-title">${esc(a.title)}</div>
            <div class="act-sub">
              <span><i class="fa-regular fa-clock"></i>${fmtDate(a.start_datetime)}</span>
              <span><i class="fa-solid fa-location-dot"></i>${esc(a.location || '—')}</span>
            </div>
          </div>
          <div class="act-count">
            <div class="num">${Number(a.attendee_count).toLocaleString()}</div>
            <div class="lbl">คน</div>
          </div>
          <div class="act-arrow"><i class="fa-solid fa-chevron-right"></i></div>
        </div>
        <div class="act-card-footer">
          <span class="act-link-url">${location.origin}/report?id=${a.id}</span>
          <button class="act-copy-btn" data-id="${a.id}" data-action="copy">
            <i class="fa-solid fa-link"></i> คัดลอกลิงก์รายงาน
          </button>
        </div>
      </div>
    `).join('');

    el.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      if (btn.dataset.action === 'open') loadDetail(btn.dataset.id);
      if (btn.dataset.action === 'copy') {
        const url = `${location.origin}/report?id=${btn.dataset.id}`;
        navigator.clipboard.writeText(url)
          .then(() => showToast('คัดลอกลิงก์แล้ว!'))
          .catch(() => prompt('คัดลอกลิงก์นี้:', url));
      }
    });

    showView('list-view');
    refreshTimer = setInterval(loadList, 60000);
  } catch (err) {
    document.getElementById('act-list').innerHTML =
      `<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><p>เกิดข้อผิดพลาด: ${esc(err.message)}</p></div>`;
    showView('list-view');
  }
}

// ─── Detail ───────────────────────────────────────────────────────────────────
async function loadDetail(id) {
  clearInterval(refreshTimer);
  showView('loading-view');
  try {
    const r = await fetch(`${API}/stats/${id}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const { success, data, message } = await r.json();
    if (!success) throw new Error(message || 'เกิดข้อผิดพลาด');

    renderDetail(data);
    showView('detail-view');
    refreshTimer = setInterval(async () => {
      try {
        const r2 = await fetch(`${API}/stats/${id}`);
        const { success: ok, data: d2 } = await r2.json();
        if (ok) renderDetail(d2, true);
      } catch {}
    }, 60000);
  } catch (err) {
    document.getElementById('d-error').innerHTML =
      `<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> ${esc(err.message)}</div>`;
    document.getElementById('d-error').style.display = 'block';
    document.getElementById('d-title').textContent = 'เกิดข้อผิดพลาด';
    document.getElementById('d-meta').innerHTML = '';
    document.getElementById('d-stats').innerHTML = '';
    document.getElementById('d-chart-panel').style.display = 'none';
    document.getElementById('d-major-panel').style.display = 'none';
    showView('detail-view');
  }
}

function renderDetail(data, silent = false) {
  const { activity, total, target_count = 0, attendance_rate = null, by_faculty, by_major } = data;

  if (!silent) {
    document.getElementById('d-error').style.display = 'none';
    document.title = `${activity.title} — NBU Activity`;
    document.getElementById('page-title').textContent = activity.title;
    document.getElementById('d-title').textContent = activity.title;
    document.getElementById('d-meta').innerHTML = [
      `<span class="chip"><i class="fa-regular fa-clock"></i>${fmtDate(activity.start_datetime)}</span>`,
      activity.end_datetime
        ? `<span class="chip"><i class="fa-solid fa-arrow-right"></i>${fmtDate(activity.end_datetime)}</span>`
        : '',
      activity.location
        ? `<span class="chip"><i class="fa-solid fa-location-dot"></i>${esc(activity.location)}</span>`
        : '',
    ].join('');
  }

  // Stat boxes
  const majorCount = [...new Set((by_major||[]).map(m=>m.label))].length;
  const absent     = target_count > 0 ? target_count - total : null;
  document.getElementById('d-stats').innerHTML = `
    ${target_count > 0 ? `
    <div class="stat-box" style="background:linear-gradient(135deg,rgba(0,119,255,0.08),rgba(0,198,255,0.05));border-color:rgba(0,119,255,0.25);grid-column:1/-1">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">เป้าหมาย / เข้าร่วม</div>
          <div style="font-size:28px;font-weight:800;color:#fff;line-height:1">
            ${Number(total).toLocaleString()}
            <span style="font-size:16px;color:var(--muted)"> / ${Number(target_count).toLocaleString()} คน</span>
          </div>
          <div style="margin-top:8px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${attendance_rate}%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:3px;transition:width 0.8s ease"></div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:36px;font-weight:800;color:var(--cyan);line-height:1">${attendance_rate}%</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">อัตราการเข้าร่วม</div>
          <div style="font-size:12px;color:#f87171;margin-top:4px">ขาด ${Number(absent).toLocaleString()} คน</div>
        </div>
      </div>
    </div>` : ''}
    <div class="stat-box">
      <div class="stat-num">${Number(total).toLocaleString()}</div>
      <div class="stat-lbl">ผู้เข้าร่วมทั้งหมด (คน)</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">${by_faculty.length}</div>
      <div class="stat-lbl">คณะที่เข้าร่วม</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">${majorCount}</div>
      <div class="stat-lbl">สาขาที่เข้าร่วม</div>
    </div>
  `;

  // Faculty bar chart
  if (by_faculty.length) {
    document.getElementById('d-chart-panel').style.display = 'block';
    renderFacultyChart(by_faculty);
  } else {
    document.getElementById('d-chart-panel').style.display = 'none';
  }

  // Faculty + Major accordion
  if (by_faculty.length) {
    document.getElementById('d-major-panel').style.display = 'block';
    renderMajorAccordion(by_faculty, by_major || []);
  } else {
    document.getElementById('d-major-panel').style.display = 'none';
  }

  // Refresh timestamp
  document.getElementById('refresh-note').textContent =
    `อัปเดตล่าสุด ${new Date().toLocaleTimeString('th-TH')}`;
}

// ─── Faculty chart ────────────────────────────────────────────────────────────
const COLORS = ['#0077ff','#00c6ff','#22c55e','#f59e0b','#a855f7',
                '#ef4444','#06b6d4','#84cc16','#f97316','#ec4899'];

function renderFacultyChart(byFac) {
  if (facChart) { facChart.destroy(); facChart = null; }
  const ctx = document.getElementById('fac-chart').getContext('2d');
  facChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: byFac.map(f => f.label || '—'),
      datasets: [{
        label: 'จำนวนนักศึกษา',
        data: byFac.map(f => +f.count),
        backgroundColor: byFac.map((_,i) => COLORS[i%COLORS.length]+'bb'),
        borderColor:     byFac.map((_,i) => COLORS[i%COLORS.length]),
        borderWidth:1, borderRadius:6,
      }],
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{ callbacks:{ label: c => ` ${c.raw.toLocaleString()} คน` } },
      },
      scales:{
        x:{ ticks:{color:'#94a3b8',font:{family:'Prompt',size:11}},
            grid:{color:'rgba(255,255,255,0.04)'} },
        y:{ ticks:{color:'#94a3b8',font:{family:'Prompt'}},
            grid:{color:'rgba(255,255,255,0.06)'},beginAtZero:true },
      },
    },
  });
}

// ─── Faculty + Major accordion ────────────────────────────────────────────────
function renderMajorAccordion(byFaculty, byMajor) {
  const maxFac = Math.max(...byFaculty.map(f => +f.count), 1);
  const container = document.getElementById('d-major-list');

  // Group major rows by faculty
  const majorMap = {};
  byMajor.forEach(m => {
    if (!majorMap[m.faculty]) majorMap[m.faculty] = [];
    majorMap[m.faculty].push(m);
  });

  container.innerHTML = byFaculty.map((fac, fi) => {
    const majors = majorMap[fac.label] || [];
    const maxMaj = Math.max(...majors.map(m => +m.count), 1);
    const color  = COLORS[fi % COLORS.length];
    const pct    = Math.round(+fac.count / maxFac * 100);

    const majorRows = majors.map(m => `
      <div class="major-row">
        <div class="major-name">${esc(m.label || '—')}</div>
        <div class="major-count">${Number(m.count).toLocaleString()} คน</div>
        <div class="major-bar-wrap">
          <div class="major-bar-fill" style="width:${Math.round(+m.count/maxMaj*100)}%;background:${color}88"></div>
        </div>
      </div>
    `).join('');

    return `
      <div class="fac-group">
        <div class="fac-group-header" data-fac="${fi}">
          <div style="width:10px;height:10px;border-radius:3px;flex-shrink:0;background:${color}"></div>
          <div class="fac-group-name">${esc(fac.label || '—')}</div>
          <div class="fac-group-count">${Number(fac.count).toLocaleString()} คน</div>
          <div class="fac-group-pct">(${pct}%)</div>
          <i class="fa-solid fa-chevron-right fac-toggle"></i>
        </div>
        <div class="major-list" id="major-${fi}">
          ${majorRows || '<div class="major-row"><div class="major-name" style="color:var(--muted)">—</div></div>'}
        </div>
      </div>
    `;
  }).join('');

  // Toggle accordion
  container.querySelectorAll('.fac-group-header').forEach(h => {
    h.addEventListener('click', () => {
      const idx = h.dataset.fac;
      const list = document.getElementById(`major-${idx}`);
      const icon = h.querySelector('.fac-toggle');
      const isOpen = list.classList.toggle('open');
      icon.classList.toggle('open', isOpen);
    });
  });

  // Auto-open first faculty
  if (byFaculty.length > 0) {
    const first = container.querySelector('.fac-group-header');
    if (first) first.click();
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
const initId = getIdFromURL();
if (initId) {
  loadDetail(initId);
} else {
  loadList();
}
</script>
</body>
</html>
